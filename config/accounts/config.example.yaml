# Account configuration for multi-channel upload scheduling.
# Copy this file to config.yaml and fill in your credentials.
#
# Global credentials (Meta app_id/secret, Google OAuth client, Discord, Drive)
# stay in .env. Only per-account tokens go here.

accounts:
  anime_fr:
    name: "Anime FR"
    language: "fr"
    supported_types:
      - "anime"
    avatar: "anime_fr.jpg"       # filename in <repo>/server/avatars/ (served by VPS)
    device: "iphone_13_pro"     # optional: label shown in the Discord embed (legacy manual-post field)
    # Upload slots in UTC (HH:MM). Shared by every platform on this account.
    slots:
      - "14:00"
      - "18:00"
      - "21:00"
    youtube:
      refresh_token: "1//0..."
      channel_id: "UC..."        # optional: enforce upload target + shared-pool key
      category_id: "22"          # optional: defaults to global ATR_YOUTUBE_CATEGORY_ID
    meta:
      token_mode: "system_user"  # "system_user" or "long_lived_user"
      facebook_page_id: "123..."
      facebook_page_access_token: "EAA..."
      instagram_business_account_id: "456..."
      instagram_access_token: "IGA..."  # optional: defaults to facebook_page_access_token
    # Keep these at 90 until the non-public capability probe has verified the
    # exact hard limit for this Page / Instagram identity.
    facebook:
      max_reel_duration_seconds: 90
    instagram:
      max_reel_duration_seconds: 90
    tiktok:
      # Post for Me social-account id (spc_...) — enables automatic TikTok
      # publishing via the VPS server. See docs/POST_FOR_ME_SETUP.md.
      post_for_me_account_id: "spc_..."
      # Optional post options (defaults shown):
      # privacy_status: "public"
      # allow_comment: true
      # allow_duet: true
      # allow_stitch: true

  # Optional example: per-platform slot overrides.
  #
  # A `youtube:` / `facebook:` / `instagram:` / `tiktok:` block with its own
  # `slots:` REPLACES the top-level slots for that platform only. Omit the
  # block (or omit its `slots:`) to inherit the defaults above.
  #
  # Accounts sharing a social identity pool their reservations so two accounts
  # can't book the same slot:
  #   - YouTube   pooled by `youtube.channel_id`
  #   - Facebook  pooled by `meta.facebook_page_id`
  #   - Instagram pooled by `meta.instagram_business_account_id`
  #   - TikTok    pooled by tiktok.post_for_me_account_id
