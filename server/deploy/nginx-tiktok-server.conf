# nginx site config for the TikTok server.
#
# Install:
#   sudo cp deploy/nginx-tiktok-server.conf /etc/nginx/sites-available/tiktok-server.conf
#   sudo ln -s /etc/nginx/sites-available/tiktok-server.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Then provision a Let's Encrypt cert:
#   sudo certbot --nginx -d tiktok.sididi.tv
# Certbot will edit this file in place to add the `listen 443 ssl` block and
# the HTTP→HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name tiktok.sididi.tv;

    # Cap request body size — avatars are tiny, JSON payloads tinier; 5MB is
    # generous and bounds attacks before they reach FastAPI.
    client_max_body_size 5M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Optional: avatar route gets a long browser cache (the app itself sets
    # Cache-Control: public, max-age=86400 too — this just reinforces it).
    location /api/avatars/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache successful avatar responses on the nginx side for a day.
        proxy_cache_valid 200 24h;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }
}
